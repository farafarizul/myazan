<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:;" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Azan Malaysia</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <!-- ── Header ── -->
  <header class="app-header">
    <div class="header-logo">
      <span class="logo-icon">🕌</span>
      <span class="logo-text">Azan Malaysia</span>
    </div>
    <div class="header-datetime">
      <div id="current-time" class="clock">--:--:--</div>
      <div id="current-date" class="date">-- --- ----</div>
      <div id="hijri-date" class="hijri">-- --- ----H</div>
    </div>
  </header>

  <!-- ── Zone / City selector ── -->
  <section class="section-selector">
    <label for="zone-select" class="selector-label">Zon / Kawasan</label>
    <select id="zone-select" class="selector">
      <optgroup label="Wilayah Persekutuan">
        <option value="WLY01" data-lat="3.1390" data-lng="101.6869" selected>Kuala Lumpur</option>
        <option value="WLY02" data-lat="2.9264" data-lng="101.6564">Putrajaya</option>
        <option value="WLY03" data-lat="6.1248" data-lng="115.6500">Labuan</option>
      </optgroup>
      <optgroup label="Selangor">
        <option value="SGR01" data-lat="3.0738" data-lng="101.5183">Shah Alam</option>
        <option value="SGR02" data-lat="3.1478" data-lng="101.7028">Ampang Jaya</option>
        <option value="SGR03" data-lat="2.7297" data-lng="101.9381">Sepang</option>
      </optgroup>
      <optgroup label="Johor">
        <option value="JHR01" data-lat="1.4927" data-lng="103.7414">Johor Bahru</option>
        <option value="JHR02" data-lat="1.8585" data-lng="103.7427">Muar</option>
        <option value="JHR03" data-lat="2.0441" data-lng="103.3325">Batu Pahat</option>
        <option value="JHR04" data-lat="1.9606" data-lng="103.4181">Kluang</option>
      </optgroup>
      <optgroup label="Kedah">
        <option value="KDH01" data-lat="6.1184" data-lng="100.3685">Alor Setar</option>
        <option value="KDH02" data-lat="5.8682" data-lng="100.7257">Sungai Petani</option>
      </optgroup>
      <optgroup label="Kelantan">
        <option value="KTN01" data-lat="6.1254" data-lng="102.2381">Kota Bharu</option>
      </optgroup>
      <optgroup label="Melaka">
        <option value="MLK01" data-lat="2.1896" data-lng="102.2501">Melaka Tengah</option>
      </optgroup>
      <optgroup label="Negeri Sembilan">
        <option value="NSN01" data-lat="2.7258" data-lng="101.9424">Seremban</option>
      </optgroup>
      <optgroup label="Pahang">
        <option value="PHG01" data-lat="3.8126" data-lng="103.3256">Kuantan</option>
        <option value="PHG02" data-lat="3.4534" data-lng="102.4322">Temerloh</option>
      </optgroup>
      <optgroup label="Pulau Pinang">
        <option value="PNG01" data-lat="5.4145" data-lng="100.3292">Georgetown</option>
      </optgroup>
      <optgroup label="Perak">
        <option value="PRK01" data-lat="4.5921" data-lng="101.0901">Ipoh</option>
        <option value="PRK02" data-lat="4.8548" data-lng="100.7327">Taiping</option>
      </optgroup>
      <optgroup label="Perlis">
        <option value="PLS01" data-lat="6.4449" data-lng="100.1989">Kangar</option>
      </optgroup>
      <optgroup label="Sabah">
        <option value="SBH01" data-lat="5.9788" data-lng="116.0753">Kota Kinabalu</option>
        <option value="SBH02" data-lat="5.8456" data-lng="118.1179">Sandakan</option>
      </optgroup>
      <optgroup label="Sarawak">
        <option value="SWK01" data-lat="1.5534" data-lng="110.3592">Kuching</option>
        <option value="SWK02" data-lat="3.3333" data-lng="113.0333">Sibu</option>
        <option value="SWK03" data-lat="4.3995" data-lng="113.9914">Miri</option>
      </optgroup>
      <optgroup label="Terengganu">
        <option value="TRG01" data-lat="5.3297" data-lng="103.1370">Kuala Terengganu</option>
      </optgroup>
    </select>
  </section>

  <!-- ── Current / Next prayer banner ── -->
  <section class="section-current">
    <div class="current-card">
      <div class="current-label">Waktu Sembahyang Kini</div>
      <div id="current-prayer-name" class="current-name">---</div>
      <div id="current-prayer-time" class="current-time">--:--</div>
    </div>
    <div class="countdown-card">
      <div class="current-label">Waktu Seterusnya</div>
      <div id="next-prayer-name" class="next-name">---</div>
      <div id="countdown" class="countdown">--:--:--</div>
    </div>
  </section>

  <!-- ── Prayer times table ── -->
  <section class="section-prayers">
    <table class="prayer-table">
      <thead>
        <tr>
          <th>Waktu</th>
          <th>Masa</th>
        </tr>
      </thead>
      <tbody id="prayer-tbody">
        <tr><td>Subuh (Fajr)</td>    <td id="time-fajr">--:--</td></tr>
        <tr><td>Syuruk (Sunrise)</td><td id="time-sunrise">--:--</td></tr>
        <tr><td>Zohor (Dhuhr)</td>   <td id="time-dhuhr">--:--</td></tr>
        <tr><td>Asar</td>            <td id="time-asr">--:--</td></tr>
        <tr><td>Maghrib</td>         <td id="time-maghrib">--:--</td></tr>
        <tr><td>Isyak (Isha)</td>    <td id="time-isha">--:--</td></tr>
      </tbody>
    </table>
  </section>

  <!-- ── Footer ── -->
  <footer class="app-footer">
    <span id="footer-zone">WLY01</span>
    &bull; Kaedah Kiraan: JAKIM Malaysia
    &bull; <span id="footer-year">2024</span>
  </footer>

  <script src="renderer.js"></script>
</body>
</html>
